<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style></style>
</head>
<body>
{% if webcams %}
    {% for cam in webcams %}
        <div>
            <div>{{ cam.title }}</div>
            <img src="{{ cam.image_url }}" loading="lazy">
        </div>
    {% endfor %}
{% else %}
    <p>No Webcams are available.</p>
{% endif %}
</body>
</html>
