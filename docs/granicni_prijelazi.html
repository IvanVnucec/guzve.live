    <script>
         document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('search-input');
            const clearSearch = document.getElementById('clear-search');
            const images = document.querySelectorAll('main div img');
            const modal = document.getElementById('modal-image-cont');
            const modalImg = document.getElementById('modal-image');
            const closeModal = document.getElementById('close-modal');

            function normalize(text) {
                return text.toLowerCase()
                    .replace(/č/g, 'c')
                    .replace(/ć/g, 'c')
                    .replace(/đ/g, 'd')
                    .replace(/š/g, 's')
                    .replace(/ž/g, 'z');
            }

            function openModal(src, alt, title) {
                modal.style.display = 'block';
                modalImg.src = src;
                modalImg.alt = alt;
                modalImg.title = title;
            }

            function closeModalFunc() {
                modal.style.display = 'none';
            }

            if (window.innerWidth >= 726) {
                images.forEach(img => {
                    img.addEventListener('click', function() {
                        if (img.style.display !== 'none') {
                            openModal(img.src, img.alt, img.title);
                        }
                    });
                });
            }

            closeModal.addEventListener('click', closeModalFunc);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    closeModalFunc();
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModalFunc();
                }
            });

            clearSearch.addEventListener('click', function() {
                searchInput.value = '';
                searchInput.dispatchEvent(new Event('input'));
            });

            searchInput.addEventListener('input', function() {
                const query = normalize(this.value);
                images.forEach(img => {
                    const title = normalize(img.getAttribute('title') || '');
                    const display = query === '' || title.includes(query) ? 'inline' : 'none';
                    img.style.display = display;
                });
            });
        });
    </script>
